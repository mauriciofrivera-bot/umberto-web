<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umberto Campioni | Sommelier & Wine Consultant</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        :root {
            --dorado: #b58d52;
            --oscuro: #0a0a0a;
            --carbón: #121212;
            --texto-gris: #a0a0a0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--oscuro);
            color: white;
            font-family: 'Times New Roman', serif;
            overflow-x: hidden;
        }

        /* Navegación Elegante */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 50px;
            border-bottom: 1px solid #1a1a1a;
        }

        .logo {
            font-size: 1.2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--dorado);
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 30px;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--dorado);
        }

        /* Hero Section */
        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('images/Umberto_Main_Photo.jpg');
            background-size: cover;
            background-position: center;
        }

        .hero h1 {
            font-size: 4rem;
            letter-spacing: 10px;
            text-transform: uppercase;
            margin: 0;
        }

        .hero p {
            color: var(--dorado);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-top: 20px;
        }

        /* Grilla de Temáticas (Filtros) */
        .grid-section {
            padding: 100px 50px;
            background-color: var(--oscuro);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .grid-item {
            position: relative;
            height: 450px;
            overflow: hidden;
            text-decoration: none;
            display: block;
        }

        .item-bg {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .grid-item:hover .item-bg {
            transform: scale(1.1);
        }

        .item-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            transition: background 0.3s;
        }

        .grid-item:hover .item-overlay {
            background: rgba(0,0,0,0.2);
        }

        .item-text {
            position: absolute;
            bottom: 40px;
            left: 40px;
            color: white;
        }

        .item-text span {
            color: var(--dorado);
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 2px;
        }

        .item-text h3 {
            margin: 10px 0 0;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .grid-container { grid-template-columns: 1fr; }
            .hero h1 { font-size: 2.5rem; }
            nav { padding: 20px; flex-direction: column; }
            .nav-links { margin-top: 20px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Umberto Campioni</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="blog.html">Journal</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <section class="hero">
        <h1>Sommelier</h1>
        <p>Expertise & Wine Culture</p>
    </section>

    <section class="grid-section">
        <div class="grid-container">
            <a href="blog.html?cat=Work+the+Floor" class="grid-item">
                <div class="item-bg" style="background-image: url('images/Wine_Uncorked_Logo.jpg');"></div>
                <div class="item-overlay"></div>
                <div class="item-text">
                    <span>Service & Hospitality</span>
                    <h3>Work the Floor</h3>
                </div>
            </a>
            
            <a href="blog.html?cat=Choose+the+wine" class="grid-item">
                <div class="item-bg" style="background-image: url('images/NBS_Logo.jpg');"></div>
                <div class="item-overlay"></div>
                <div class="item-text">
                    <span>Selection</span>
                    <h3>Choose the wine</h3>
                </div>
            </a>
            
            <a href="blog.html?cat=Tell+you+what+really+matters" class="grid-item">
                <div class="item-bg" style="background-image: url('images/Umberto_Main_Photo.jpg');"></div>
                <div class="item-overlay"></div>
                <div class="item-text">
                    <span>No BS Consulting</span>
                    <h3>Tell you what really matters</h3>
                </div>
            </a>
        </div>
    </section>

    <footer style="text-align: center; padding: 50px; color: #444; border-top: 1px solid #1a1a1a;">
        <p>&copy; 2026 Umberto Campioni. Built by Rivera Engineering.</p>
    </footer>

    <script>
        // Lógica para el widget de identidad de Netlify
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => {
                        document.location.href = "/admin/";
                    });
                }
            });
        }
    </script>
</body>
</html>
