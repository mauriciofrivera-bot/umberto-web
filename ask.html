<div class="form-wrapper">
    <form name="ask-anything" method="POST" data-netlify="true" action="/success.html">
        
        <input type="hidden" name="form-name" value="ask-anything" />
        
        <div class="input-group">
            <label>Your Name</label>
            <input type="text" name="name" required placeholder="How should I address you?">
        </div>

        <div class="input-group">
            <label>Email Address</label>
            <input type="email" name="email" required placeholder="Where should I send the answer?">
        </div>

        <div class="input-group">
            <label>Your Question</label>
            <textarea name="question" rows="5" required placeholder="Ask about a specific bottle, region, or industry secret..."></textarea>
        </div>

        <button type="submit" class="btn-submit">Submit Question</button>
    </form>
</div>
