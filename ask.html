<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ask Me Anything | Umberto Campioni</title>
    
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">

    <style>
        :root {
            --dorado: #b58d52;
            --dorado-brillante: #e0b36e;
            --oscuro-puro: #000000;
            --blanco: #ffffff;
            --gris-linea: #444444;
            --gris-texto: #888888;
            --gris-labels: #cccccc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--oscuro-puro);
            color: var(--blanco);
            font-family: 'EB Garamond', serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* --- NAVEGACIÓN --- */
        nav {
            display: flex;
            justify-content: center;
            padding: 30px;
            gap: 25px;
            background: var(--oscuro-puro);
            border-bottom: 1px solid #111;
        }

        nav a {
            color: var(--gris-texto);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 3px;
            transition: color 0.3s;
        }

        nav a:hover { color: var(--dorado); }

        .container {
            max-width: 800px;
            margin: 60px auto;
            padding: 0 40px;
            text-align: center;
        }

        /* --- TÍTULO --- */
        .ask-header {
            margin-bottom: 60px;
        }

        h1 { 
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 10vw, 3.5rem); 
            text-transform: uppercase; 
            letter-spacing: 10px; 
            font-weight: 700; 
            color: var(--blanco);
            margin-bottom: 20px;
        }

        .divider {
            width: 60px;
            height: 2px;
            background: var(--dorado);
            margin: 20px auto;
        }

        .intro-text {
            color: var(--gris-texto);
            font-style: italic;
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* --- FORMULARIO --- */
        .form-wrapper {
            margin-top: 50px;
            text-align: left;
        }

        .input-group {
            margin-bottom: 40px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--dorado);
            margin-bottom: 15px;
            font-weight: 700;
        }

        input, textarea {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1.5px solid var(--gris-linea);
            color: var(--blanco);
            padding: 15px 0;
            font-family: 'EB Garamond', serif;
            font-size: 1.3rem;
            outline: none;
            transition: all 0.4s ease;
        }

        input:focus, textarea:focus {
            border-bottom-color: var(--dorado-brillante);
            background: rgba(255, 255, 255, 0.03);
        }

        input::placeholder, textarea::placeholder {
            color: #444;
            font-size: 1rem;
            font-style: italic;
        }

        /* --- BOTÓN --- */
        .btn-submit {
            background: transparent;
            border: 1px solid var(--dorado);
            color: var(--dorado);
            padding: 20px 0;
            text-transform: uppercase;
            letter-spacing: 6px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: all 0.4s ease;
        }

        .btn-submit:hover {
            background: var(--dorado);
            color: var(--oscuro-puro);
            box-shadow: 0 0 30px rgba(181, 141, 82, 0.2);
        }

        footer {
            text-align: center;
            padding: 80px 20px 40px;
            color: #333;
            font-size: 0.7rem;
            letter-spacing: 3px;
        }

        @media (max-width: 600px) {
            .container { margin: 40px auto; padding: 0 25px; }
            h1 { font-size: 2rem; letter-spacing: 5px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="blog.html">Journal</a>
        <a href="about.html">About</a>
        <a href="ask.html">Ask Me Anything</a>
        <a href="contact.html">Contact</a>
    </nav>

    <div class="container">
        <header class="ask-header">
            <h1>Ask Me Anything</h1>
            <div class="divider"></div>
            <p class="intro-text">Unfiltered insights into the world of wine, service, and hospitality.</p>
        </header>

        <div class="form-wrapper">
            <form name="ask-anything" method="POST" data-netlify="true" action="/success.html">
                <input type="hidden" name="form-name" value="ask-anything" />
                
                <div class="input-group">
                    <label>Your Name</label>
                    <input type="text" name="name" required placeholder="How should I address you?">
                </div>

                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" name="email" required placeholder="Where should I send the answer?">
                </div>

                <div class="input-group">
                    <label>Your Question</label>
                    <textarea name="question" rows="5" required placeholder="Ask about a specific bottle, region, or industry secret..."></textarea>
                </div>

                <button type="submit" class="btn-submit">Submit Question</button>
            </form>
        </div>
    </div>

    <footer>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<a href="https://instagram.com/umberto_campioni" class="instagram-link" target="_blank" rel="noopener noreferrer">
    <i class="fa-brands fa-instagram"></i>
    <span>Umberto_Campioni</span>
</a>

<style>
    .instagram-link {
        display: inline-flex;
        align-items: center;
        gap: 10px; /* Espacio entre el logo y el texto */
        color: var(--blanco, #f0f0f0); /* Color blanco suave por defecto */
        text-decoration: none;
        text-transform: uppercase;
        font-family: 'Garamond', serif;
        font-size: 1.1rem;
        letter-spacing: 2px;
        transition: color 0.3s ease, transform 0.3s ease;
    }

    /* El tamaño del icono de Instagram se ajusta automáticamente con el font-size */
    .instagram-link i {
        font-size: 1.3rem; 
    }

    /* Efecto sutil al pasar el cursor (Cambia al color dorado característico) */
    .instagram-link:hover {
        color: #b58d52; /* Tu color --dorado corporativo */
        transform: translateY(-2px); /* Pequeño movimiento hacia arriba muy elegante */
    }
</style>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<a href="https://instagram.com/fashion_gourmet" class="instagram-link" target="_blank" rel="noopener noreferrer">
    <i class="fa-brands fa-instagram"></i>
    <span>Fashion_Gourmet</span>
</a>

<style>

        display: inline-flex;
        align-items: center;
        gap: 10px; /* Espacio entre el logo y el texto */

        text-decoration: none;
        text-transform: uppercase;
        font-family: 'Garamond', serif;
        font-size: 0.9rem;
        letter-spacing: 2px;
        transition: color 0.3s ease, transform 0.3s ease;
    }

    .instagram-link i {
        font-size: 1.3rem; 
    }

    /* Efecto sutil al pasar el cursor (Cambia al color dorado característico) */
    .instagram-link:hover {
        color: #b58d52; /* Tu color --dorado corporativo */

    }
</style>

    </footer>

</body>
</html>
