<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal | Umberto Campioni</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <style>
        :root { --dorado: #b58d52; --oscuro: #0a0a0a; --blanco: #f0f0f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--oscuro); color: var(--blanco); font-family: 'Garamond', serif; line-height: 1.8; }
        nav { display: flex; justify-content: center; padding: 25px; gap: 30px; border-bottom: 1px solid #111; }
        nav a { color: var(--blanco); text-decoration: none; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px; }
        .container { max-width: 800px; margin: 60px auto; padding: 0 20px; }
        .header { text-align: center; margin-bottom: 50px; }
        #post-title { font-size: 3rem; text-transform: uppercase; letter-spacing: 3px; font-weight: normal; }
        .img-container { width: 100%; margin-bottom: 50px; display: none; border: 1px solid #1a1a1a; }
        #post-image { width: 100%; height: auto; display: block; }
        #post-content { font-size: 1.2rem; color: #ccc; }
        footer { text-align: center; padding: 80px; color: #444; font-size: 0.7rem; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a><a href="blog.html">Blog</a><a href="about.html">About</a><a href="contact.html">Contact</a>
    </nav>
    <article class="container">
        <header class="header"><h1 id="post-title">Sincronizando...</h1></header>
        <div id="img-wrapper" class="img-container"><img id="post-image" src="" alt=""></div>
        <div id="post-content"></div>
    </article>
    <footer><p>&copy; 2026 UMBERTO CAMPIONI. BUILT BY RIVERA ENGINEERING.</p></footer>

    <script>
        const USER = 'mauriciofrivera-bot';
        const REPO = 'umberto-web';

        async function loadArticle() {
            const params = new URLSearchParams(window.location.search);
            const fileName = params.get('article');
            if (!fileName) return;

            const url = `https://raw.githubusercontent.com/${USER}/${REPO}/main/_posts/${fileName}`;
            try {
                const res = await fetch(url);
                const text = await res.text();
                const parts = text.split('---');
                if (parts.length >= 3) {
                    const meta = jsyaml.load(parts[1]);
                    document.getElementById('post-title').innerText = meta.title;
                    
                    if (meta.featured_image) {
                        const img = document.getElementById('post-image');
                        const wrapper = document.getElementById('img-wrapper');
                        let path = meta.featured_image;
                        if (path.startsWith('/')) path = path.substring(1);
                        
                        img.src = path;
                        wrapper.style.display = 'block';
                        img.onerror = () => {
                            img.src = `https://raw.githubusercontent.com/${USER}/${REPO}/main/${path}`;
                            img.onerror = () => wrapper.style.display = 'none';
                        };
                    }
                    document.getElementById('post-content').innerHTML = marked.parse(parts.slice(2).join('---'));
                }
            } catch (err) { console.error(err); }
        }
        window.onload = loadArticle;
    </script>
</body>
</html>
