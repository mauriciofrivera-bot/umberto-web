<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Journal | Umberto Campioni</title>
    
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>

    <style>
        :root {
            --dorado: #b58d52;
            --oscuro: #0a0a0a;
            --blanco: #f0f0f0;
            --gris-texto: #d1d1d1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background-color: var(--oscuro); 
            color: var(--blanco); 
            font-family: 'EB Garamond', serif; 
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        nav { 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
            gap: 25px; 
            border-bottom: 1px solid #1a1a1a; 
            position: sticky;
            top: 0;
            background: rgba(10, 10, 10, 0.95);
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        nav a { color: var(--blanco); text-decoration: none; text-transform: uppercase; font-size: 1.1rem; letter-spacing: 2px; }

        .post-container {
            max-width: 780px; 
            margin: 60px auto;
            padding: 0 30px;
        }

        /* --- TÍTULO ENMARCADO --- */
        .post-header {
            text-align: center;
            margin-bottom: 60px;
            padding: 50px 20px;
            border: 2px solid var(--dorado); /* Marco más definido en dorado */
            position: relative;
        }

        .post-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 8vw, 3.2rem);
            text-transform: uppercase;
            letter-spacing: 4px;
            line-height: 1.2;
            font-weight: 700; /* Negrita */
            color: var(--dorado); /* Título en dorado */
            margin: 0;
        }

        /* --- EFECTO EN LA FOTOGRAFÍA --- */
        #img-wrapper {
            width: 100%;
            margin: 40px 0 60px 0;
            display: none;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9);
            border: 1px solid var(--dorado);
            transition: all 0.8s ease;
        }

        #post-image {
            width: 100%;
            height: auto;
            display: block;
            filter: contrast(110%);
        }

        /* --- CONTENIDO EDITORIAL --- */
        .post-content { font-size: 1.3rem; color: var(--gris-texto); text-align: justify; }

        /* Letra Capital Dorada y Negrita */
        .post-content > p:first-of-type::first-letter {
            float: left;
            font-family: 'Playfair Display', serif;
            font-size: 5.5rem;
            line-height: 0.7;
            padding-right: 15px;
            padding-top: 12px;
            color: var(--dorado);
            font-weight: 700;
        }

        /* Negritas en el cuerpo del texto en Dorado */
        .post-content strong, .post-content b {
            color: var(--dorado);
            font-weight: 700;
        }

        /* Viñetas de Diamante */
        .post-content ul { list-style: none; margin: 30px 0; padding-left: 10px; }
        .post-content li { position: relative; margin-bottom: 18px; padding-left: 35px; }
        .post-content li::before {
            content: "◆"; 
            position: absolute;
            left: 0;
            color: var(--dorado);
            font-size: 0.9rem;
            font-weight: 700;
            top: 2px;
        }

        .post-content h2, .post-content h3 {
            font-family: 'Playfair Display', serif;
            color: var(--dorado);
            font-weight: 700;
            text-transform: uppercase;
            margin: 40px 0 20px 0;
        }

        blockquote {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.7rem;
            color: var(--dorado);
            font-weight: 700;
            margin: 50px 0;
            text-align: center;
            border: none;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 600px) {
            .post-container { margin: 30px auto; padding: 0 20px; }
            .post-content { font-size: 1.15rem; text-align: left; }
            .post-content > p:first-of-type::first-letter { font-size: 4rem; }
        }

        #comments-section { margin-top: 100px; border-top: 1px solid #222; padding-top: 50px; }

        footer { text-align: center; padding: 80px 20px; color: #444; font-size: 0.7rem; letter-spacing: 2px; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="blog.html">Journal</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>

    <article class="post-container">
        <header class="post-header">
            <span id="post-category" style="display: none;"></span>
            <h1 id="post-title">...</h1>
        </header>

        <div id="img-wrapper">
            <img id="post-image" src="" alt="">
        </div>

        <div id="post-content" class="post-content"></div>

        <section id="comments-section">
            <div id="disqus_thread"></div>
        </section>
    </article>

    <footer>
                <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<a href="https://instagram.com/umberto_campioni" class="instagram-link" target="_blank" rel="noopener noreferrer">
    <i class="fa-brands fa-instagram"></i>
    <span>Umberto_Campioni</span>
</a>

<style>

        display: inline-flex;
        align-items: center;
        gap: 10px; /* Espacio entre el logo y el texto */

<a href="https://instagram.com/fashion_gourmet" class="instagram-link" target="_blank" rel="noopener noreferrer">

<style>

    <script>
        const USER = 'mauriciofrivera-bot';
        const REPO = 'umberto-web';

        async function loadPost() {
            const params = new URLSearchParams(window.location.search);
            const fileName = params.get('article');
            if (!fileName) return;

            const url = `https://raw.githubusercontent.com/${USER}/${REPO}/main/_posts/${fileName}`;

            try {
                const res = await fetch(url);
                const buffer = await res.arrayBuffer();
                const decoder = new TextDecoder('utf-8');
                const text = decoder.decode(buffer);
                
                const parts = text.split('---');
                if (parts.length >= 3) {
                    const meta = jsyaml.load(parts[1]);
                    document.getElementById('post-title').innerText = meta.title;

                    if (meta.thumbnail) {
                        const img = document.getElementById('post-image');
                        const wrapper = document.getElementById('img-wrapper');
                        const fileNameOnly = meta.thumbnail.split('/').pop();
                        img.src = `images/blog/${fileNameOnly}`;
                        wrapper.style.display = 'block';
                        img.onerror = () => img.src = `https://raw.githubusercontent.com/${USER}/${REPO}/main/images/blog/${fileNameOnly}`;
                    }

                    document.getElementById('post-content').innerHTML = marked.parse(parts.slice(2).join('---'));
                    
                    var disqus_config = function () {
                        this.page.url = window.location.href;
                        this.page.identifier = fileName;
                    };
                    var d = document, s = d.createElement('script');
                    s.src = 'https://umberto-sommelier.disqus.com/embed.js';
                    s.setAttribute('data-timestamp', +new Date());
                    (d.head || d.body).appendChild(s);
                }
            } catch (err) { console.error(err); }
        }
        window.onload = loadPost;
    </script>
</body>
</html>
