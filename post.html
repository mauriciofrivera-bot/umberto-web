<script>
    const USER = 'mauriciofrivera-bot';
    const REPO = 'umberto-web';

    async function renderPost() {
        const params = new URLSearchParams(window.location.search);
        const fileName = params.get('article');
        const display = document.getElementById('post-content');

        if (!fileName) {
            window.location.href = 'blog.html';
            return;
        }

        // Añadimos un timestamp (?t=...) para obligar a GitHub a darnos la versión más nueva
        const url = `https://raw.githubusercontent.com/${USER}/${REPO}/main/_posts/${fileName}?t=${Date.now()}`;

        try {
            const res = await fetch(url);
            
            if (!res.ok) {
                throw new Error(`No se pudo acceder al archivo. Estado: ${res.status}`);
            }

            const rawText = await res.text();
            const parts = rawText.split('---');

            if (parts.length >= 3) {
                const meta = jsyaml.load(parts[1]);
                const markdownContent = parts.slice(2).join('---');

                document.getElementById('post-title').innerText = meta.title || "Sin Título";
                document.getElementById('post-category').innerText = meta.category || "Journal";
                
                if (metadata.featured_image) {
                    const img = document.getElementById('post-image');
                    img.src = metadata.featured_image;
                    img.style.display = 'block';
                }

                display.innerHTML = marked.parse(markdownContent);
            } else {
                // Si no hay separadores ---, renderizar todo el texto
                display.innerHTML = marked.parse(rawText);
            }
        } catch (err) {
            console.error("Detalle del error:", err);
            display.innerHTML = `
                <div style="text-align:center; padding: 40px; border: 1px solid #222;">
                    <p style="color: var(--dorado); font-weight: bold;">AVISO DE SISTEMA</p>
                    <p style="font-size: 0.85rem; color: #888; margin-top: 10px;">
                        ${err.message}<br>
                        Intentando leer: <strong>_posts/${fileName}</strong>
                    </p>
                    <p style="font-size: 0.7rem; margin-top: 20px;">
                        Si acabas de hacer el cambio a Público, espera 30 segundos y presiona <strong>CTRL + F5</strong>.
                    </p>
                </div>
            `;
        }
    }

    window.onload = renderPost;
</script>
