<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>

<script>
    const USER = 'mauriciofrivera-bot';
    const REPO = 'umberto-web';

    async function renderPost() {
        const params = new URLSearchParams(window.location.search);
        const fileName = params.get('article');
        const display = document.getElementById('post-content');

        if (!fileName) {
            window.location.href = 'blog.html';
            return;
        }

        const url = `https://raw.githubusercontent.com/${USER}/${REPO}/main/_posts/${fileName}`;

        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error("No se encontró el archivo del artículo.");

            const text = await res.text();
            const parts = text.split('---');

            if (parts.length >= 3) {
                const meta = jsyaml.load(parts[1]);
                const content = parts.slice(2).join('---');

                document.getElementById('post-title').innerText = meta.title || "Journal";
                document.getElementById('post-category').innerText = meta.category || "General";
                
                // --- CORRECCIÓN DE RUTA DE IMAGEN ---
                if (meta.featured_image) {
                    const img = document.getElementById('post-image');
                    // Quitamos el "/" inicial si existe para que la ruta sea relativa
                    let cleanSrc = meta.featured_image.startsWith('/') 
                        ? meta.featured_image.substring(1) 
                        : meta.featured_image;
                    
                    img.src = cleanSrc;
                    img.style.display = 'block';
                    img.onerror = () => img.style.display = 'none';
                }

                display.innerHTML = marked.parse(content);
            }
        } catch (err) {
            console.error("Error:", err);
            display.innerHTML = `<p style="text-align:center; color: #666; padding: 50px;">
                Cargando contenido... <br>
                <small>Si no aparece, verifica que el artículo esté publicado en GitHub.</small>
            </p>`;
        }
    }

    window.onload = renderPost;
</script>
