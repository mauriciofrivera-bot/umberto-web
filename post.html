<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Journal | Umberto Campioni</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>

    <style>
        :root {
            --dorado: #b58d52;
            --oscuro: #0a0a0a;
            --blanco: #f0f0f0;
            --gris-texto: #d1d1d1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background-color: var(--oscuro); 
            color: var(--blanco); 
            font-family: 'Garamond', serif; 
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
        }

        /* --- NAVEGACIÓN MÓVIL OPTIMIZADA --- */
        nav { 
            display: flex; 
            justify-content: center; 
            padding: 20px 10px; 
            gap: 15px; 
            border-bottom: 1px solid #111; 
            position: sticky;
            top: 0;
            background: rgba(10, 10, 10, 0.95);
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        nav a { 
            color: var(--blanco); 
            text-decoration: none; 
            text-transform: uppercase; 
            font-size: 0.65rem; 
            letter-spacing: 1.5px; 
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .post-container {
            max-width: 750px; 
            margin: 40px auto;
            padding: 0 25px; /* Más margen en móviles para que el texto no toque los bordes */
        }

        .post-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .post-meta {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--dorado);
            display: block;
            margin-bottom: 10px;
        }

        .post-header h1 {
            font-size: 2.8rem; /* Tamaño masivo para escritorio */
            text-transform: uppercase;
            letter-spacing: 3px;
            line-height: 1.1;
            font-weight: normal;
        }

        #img-wrapper {
            width: 100%;
            margin: 30px 0 40px 0;
            display: none;
        }

        #post-image {
            width: 100%;
            height: auto;
            border: 1px solid #1a1a1a;
            padding: 5px;
        }

        /* --- CUERPO DEL TEXTO --- */
        .post-content {
            font-size: 1.25rem;
            color: var(--gris-texto);
            text-align: justify;
            hyphens: auto; /* Mejora la justificación en pantallas estrechas */
        }

        /* Letra Capital Adaptable */
        .post-content > p:first-of-type::first-letter {
            float: left;
            font-size: 4.5rem;
            line-height: 0.8;
            padding-right: 12px;
            padding-top: 8px;
            color: var(--dorado);
        }

        .post-content p { margin-bottom: 25px; }

        .post-content h2 {
            font-size: 1.4rem;
            color: var(--blanco);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 45px 0 20px 0;
            border-left: 2px solid var(--dorado);
            padding-left: 15px;
        }

        blockquote {
            font-style: italic;
            font-size: 1.4rem;
            color: var(--dorado);
            margin: 40px 10px;
            text-align: center;
            line-height: 1.5;
        }

        /* --- AJUSTES ESPECÍFICOS PARA SMARTPHONES --- */
        @media (max-width: 600px) {
            .post-container { margin: 20px auto; padding: 0 20px; }
            
            .post-header h1 { font-size: 2rem; letter-spacing: 2px; }
            
            .post-content { 
                font-size: 1.1rem; /* Texto ligeramente más pequeño para móvil */
                text-align: left; /* En móvil es mejor alinear a la izquierda para evitar huecos */
            }

            .post-content > p:first-of-type::first-letter {
                font-size: 3.5rem; /* Letra capital más pequeña en móvil */
            }

            blockquote { font-size: 1.2rem; margin: 30px 5px; }

            nav { gap: 10px; }
            nav a { font-size: 0.6rem; letter-spacing: 1px; }
        }

        /* --- DISQUS --- */
        #comments-section {
            margin-top: 80px;
            border-top: 1px solid #222;
            padding-top: 40px;
        }
        #comments-section h3 {
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            margin-bottom: 30px;
            color: var(--dorado);
            text-align: center;
        }

        footer { text-align: center; padding: 60px 20px; color: #444; font-size: 0.65rem; letter-spacing: 2px; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="blog.html">Journal</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>

    <article class="post-container">
        <header class="post-header">
            <span id="post-category" class="post-meta">Journal</span>
            <h1 id="post-title">...</h1>
        </header>

        <div id="img-wrapper">
            <img id="post-image" src="" alt="">
        </div>

        <div id="post-content" class="post-content">
            </div>

        <section id="comments-section">
            <h3>Thoughts & Conversations</h3>
            <div id="disqus_thread"></div>
        </section>
    </article>

    <footer>
        &copy; 2026 UMBERTO CAMPIONI. <br> BUILT BY RIVERA ENGINEERING.
    </footer>

    <script>
        const USER = 'mauriciofrivera-bot';
        const REPO = 'umberto-web';

        async function loadPost() {
            const params = new URLSearchParams(window.location.search);
            const article = params.get('article');
            if (!article) return;

            try {
                const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/_posts/${article}`);
                const data = await res.json();
                const text = atob(data.content);
                const parts = text.split('---');

                if (parts.length >= 3) {
                    const meta = jsyaml.load(parts[1]);
                    document.title = `${meta.title} | Umberto Campioni`;
                    document.getElementById('post-title').innerText = meta.title;
                    document.getElementById('post-category').innerText = (meta.categories && meta.categories[0]) || "Journal";

                    if (meta.thumbnail) {
                        const img = document.getElementById('post-image');
                        const wrapper = document.getElementById('img-wrapper');
                        const fileName = meta.thumbnail.split('/').pop();
                        img.src = `images/blog/${fileName}`;
                        wrapper.style.display = 'block';
                        img.onerror = () => img.src = `https://raw.githubusercontent.com/${USER}/${REPO}/main/images/blog/${fileName}`;
                    }

                    document.getElementById('post-content').innerHTML = marked.parse(parts.slice(2).join('---'));
                    
                    // Inicializar Disqus
                    var disqus_config = function () {
                        this.page.url = window.location.href;
                        this.page.identifier = article;
                    };
                    var d = document, s = d.createElement('script');
                    s.src = 'https://umberto-sommelier.disqus.com/embed.js';
                    s.setAttribute('data-timestamp', +new Date());
                    (d.head || d.body).appendChild(s);
                }
            } catch (err) { console.error(err); }
        }
        window.onload = loadPost;
    </script>
</body>
</html>
