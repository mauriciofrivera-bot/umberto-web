<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Journal | Umberto Campioni</title>
    
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>

    <style>
        :root {
            --dorado: #b58d52;
            --oscuro: #0a0a0a;
            --blanco: #f0f0f0;
            --gris-texto: #d1d1d1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background-color: var(--oscuro); 
            color: var(--blanco); 
            font-family: 'EB Garamond', serif; 
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        nav { display: flex; justify-content: center; padding: 25px; gap: 30px; border-bottom: 1px solid #111; }
        nav a { color: var(--blanco); text-decoration: none; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 2px; }

        .post-container { max-width: 800px; margin: 0 auto; padding: 60px 20px 80px; }
        
        .post-header { text-align: center; margin-bottom: 40px; }
        .post-header h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3.2rem); text-transform: uppercase; letter-spacing: 2px; line-height: 1.2; margin-bottom: 15px; }
        
        .img-wrapper { width: 100%; height: auto; max-height: 480px; overflow: hidden; margin-bottom: 40px; display: none; border: 1px solid #111; }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        .post-content { font-size: 1.15rem; color: var(--gris-texto); text-align: justify; }
        .post-content p { margin-bottom: 25px; }
        .post-content h2, .post-content h3 { font-family: 'Playfair Display', serif; color: var(--blanco); margin: 40px 0 20px; text-transform: uppercase; letter-spacing: 1px; }
        .post-content blockquote { border-left: 3px solid var(--dorado); padding-left: 20px; font-style: italic; margin: 35px 0; color: var(--dorado); font-size: 1.25rem; }

        /* Estilos específicos para la caja de comentarios de Cusdis */
        #cusdis_thread {
            margin-top: 60px;
            padding-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        footer { text-align: center; padding: 40px; color: #444; font-size: 0.75rem; border-top: 1px solid #111; margin-top: 60px; }

        @media (max-width: 600px) {
            .post-container { padding: 40px 15px 60px; }
            .post-content { text-align: left; font-size: 1.1rem; }
            #cusdis_thread { margin-top: 40px; padding-top: 30px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="blog.html">Journal</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>

    <main class="post-container">
        <header class="post-header">
            <h1 id="post-title">Loading...</h1>
        </header>

        <div class="img-wrapper" id="img-wrapper">
            <img id="post-image" src="" alt="">
        </div>

        <article class="post-content" id="post-content">
            </article>

        <div id="cusdis_thread"
          data-host="https://cusdis.com"
          data-app-id="1f76b7ff-8c4d-45a5-bb7f-d3279c2929d4"
          data-page-id="" 
          data-page-url=""
          data-page-title="">
        </div>
    </main>

    <footer>
        <p>&copy; 2026 UMBERTO CAMPIONI.</p>
    </footer>

    <script async defer src="https://cusdis.com/js/cusdis.es.js"></script>

    <script>
        const USER = "Arthemis80";
        const REPO = "umberto-sommelier";

        async function loadPost() {
            const urlParams = new URLSearchParams(window.location.search);
            const fileName = urlParams.get('post');

            if (!fileName) {
                document.getElementById('post-title').innerText = "Post not found";
                return;
            }

            try {
                const res = await fetch(`https://raw.githubusercontent.com/${USER}/${REPO}/main/_posts/${fileName}`);
                if (!res.ok) throw new Error("No se pudo obtener el post");
                const text = await res.text();

                const parts = text.split('---');
                if (parts.length >= 3) {
                    const meta = jsyaml.load(parts[1]);
                    document.getElementById('post-title').innerText = meta.title;

                    if (meta.thumbnail) {
                        const img = document.getElementById('post-image');
                        const wrapper = document.getElementById('img-wrapper');
                        const fileNameOnly = meta.thumbnail.split('/').pop();
                        img.src = `images/blog/${fileNameOnly}`;
                        wrapper.style.display = 'block';
                        img.onerror = () => img.src = `https://raw.githubusercontent.com/${USER}/${REPO}/main/images/blog/${fileNameOnly}`;
                    }

                    document.getElementById('post-content').innerHTML = marked.parse(parts.slice(2).join('---'));
                    
                    // Inicialización e inyección dinámica de los atributos para la URL del post actual
                    const cusdisContainer = document.getElementById('cusdis_thread');
                    if (cusdisContainer) {
                        cusdisContainer.setAttribute('data-page-id', fileName);
                        cusdisContainer.setAttribute('data-page-url', window.location.href);
                        cusdisContainer.setAttribute('data-page-title', meta.title || 'Journal Post');
                    }
                }
            } catch (err) { console.error(err); }
        }
        window.onload = loadPost;
    </script>
</body>
</html>
