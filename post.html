<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>

<script>
    const USER = 'mauriciofrivera-bot';
    const REPO = 'umberto-web';

    async function renderPost() {
        const params = new URLSearchParams(window.location.search);
        const fileName = params.get('article');
        const display = document.getElementById('post-content');

        if (!fileName) {
            window.location.href = 'blog.html';
            return;
        }

        const url = `https://raw.githubusercontent.com/${USER}/${REPO}/main/_posts/${fileName}`;

        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error("Artículo no encontrado.");

            const text = await res.text();
            const parts = text.split('---');

            if (parts.length >= 3) {
                const meta = jsyaml.load(parts[1]);
                const content = parts.slice(2).join('---');

                // Títulos y Meta
                document.title = `${meta.title || 'Journal'} | Umberto Campioni`;
                document.getElementById('post-title').innerText = meta.title || "Sin título";
                document.getElementById('post-category').innerText = meta.category || "Journal";
                
                // Lógica Robusta de Imagen
                if (meta.featured_image) {
                    const img = document.getElementById('post-image');
                    
                    // Limpiamos la ruta: quitamos "/" iniciales si existen
                    let cleanSrc = meta.featured_image;
                    if (cleanSrc.startsWith('/')) {
                        cleanSrc = cleanSrc.substring(1);
                    }
                    
                    img.src = cleanSrc;
                    img.style.display = 'block';
                    
                    // Si la imagen no existe en el repo, ocultamos el error
                    img.onerror = () => {
                        console.warn("Imagen no encontrada en la ruta:", cleanSrc);
                        img.style.display = 'none';
                    };
                }

                // Renderizar el Markdown
                display.innerHTML = marked.parse(content);
            }
        } catch (err) {
            console.error("Error de Rivera Engineering:", err);
            display.innerHTML = `<p style="text-align:center; color:#666; padding:50px;">
                El contenido no pudo ser cargado. Verifica la conexión con el repositorio.
            </p>`;
        }
    }

    window.onload = renderPost;
</script>
