<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>

    <script>
        // CONFIGURACIÓN RIVERA ENGINEERING
        const USER = 'mauriciofrivera-bot';
        const REPO = 'umberto-web';

        async function renderPost() {
            const params = new URLSearchParams(window.location.search);
            const file = params.get('article');
            const display = document.getElementById('post-content');

            if (!file) {
                window.location.href = 'blog.html';
                return;
            }

            // Usamos una URL que elude el caché del navegador añadiendo un número aleatorio al final (?v=...)
            const url = `https://raw.githubusercontent.com/${USER}/${REPO}/main/_posts/${file}?v=${Math.random()}`;

            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error("Archivo no encontrado en GitHub");

                const text = await res.text();
                const parts = text.split('---');

                if (parts.length >= 3) {
                    const meta = jsyaml.load(parts[1]);
                    const content = parts.slice(2).join('---');

                    // Inyectar datos
                    document.getElementById('post-title').innerText = meta.title || "Untitled";
                    document.getElementById('post-category').innerText = meta.category || "Journal";
                    
                    if (meta.featured_image) {
                        const img = document.getElementById('post-image');
                        img.src = meta.featured_image;
                        img.style.display = 'block';
                    }

                    document.getElementById('post-content').innerHTML = marked.parse(content);
                }
            } catch (err) {
                console.error("DEBUG:", err);
                display.innerHTML = `<p style="text-align:center; color:var(--dorado);">
                    Sincronizando contenido... <br>
                    <small style="color:#666;">Si el error persiste, verifica que el archivo esté en la rama 'main'.</small>
                </p>`;
            }
        }

        window.onload = renderPost;
    </script>
