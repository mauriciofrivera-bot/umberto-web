<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal | Umberto Campioni</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>

    <style>
        :root { --dorado: #b58d52; --oscuro: #0a0a0a; --blanco: #f0f0f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--oscuro); color: var(--blanco); font-family: 'Garamond', serif; line-height: 1.8; }
        nav { display: flex; justify-content: center; padding: 25px; gap: 30px; border-bottom: 1px solid #111; }
        nav a { color: var(--blanco); text-decoration: none; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px; }
        .container { max-width: 800px; margin: 60px auto; padding: 0 20px; }
        .header { text-align: center; margin-bottom: 50px; }
        #post-title { font-size: 2.8rem; text-transform: uppercase; letter-spacing: 3px; font-weight: normal; margin-bottom: 10px; }
        #post-category { color: var(--dorado); font-style: italic; font-size: 0.9rem; text-transform: uppercase; }
        .img-wrapper { width: 100%; margin-bottom: 50px; display: none; border: 1px solid #1a1a1a; }
        #post-image { width: 100%; height: auto; display: block; }
        #post-content { font-size: 1.2rem; color: #ccc; }
        #post-content p { margin-bottom: 25px; }
        footer { text-align: center; padding: 80px; color: #444; font-size: 0.7rem; }
        .back-link { display: block; margin-top: 60px; text-align: center; color: var(--dorado); text-decoration: none; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="blog.html">Blog</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>

    <article class="container">
        <header class="header">
            <div id="post-category">Journal</div>
            <h1 id="post-title">Cargando...</h1>
        </header>

        <div id="img-wrapper" class="img-wrapper">
            <img id="post-image" src="" alt="Portada">
        </div>

        <div id="post-content"></div>

        <a href="blog.html" class="back-link">← Volver al Journal</a>
    </article>

    <section style="max-width: 800px; margin: 60px auto; padding: 0 20px; border-top: 1px solid #222; padding-top: 40px;">
    <h3 style="text-transform: uppercase; letter-spacing: 3px; font-size: 0.9rem; margin-bottom: 30px; color: var(--dorado);">
        Thoughts & Conversations
    </h3>

    <div id="disqus_thread"></div>
    <script>
        var disqus_config = function () {
            this.page.url = window.location.href;  
            this.page.identifier = window.location.search; 
        };

        (function() { 
            var d = document, s = d.createElement('script');
            // IMPORTANTE: Reemplaza 'umberto-campioni' con tu Shortname real de Disqus
            s.src = 'https://umberto-campioni.disqus.com/embed.js'; 
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        })();
    </script>
    <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
</section>
    
    <footer>
        <p>&copy; 2026 UMBERTO CAMPIONI. BUILT BY RIVERA ENGINEERING.</p>
    </footer>

    <script>
        const USER = 'mauriciofrivera-bot';
        const REPO = 'umberto-web';

        async function loadPost() {
            const params = new URLSearchParams(window.location.search);
            const fileName = params.get('article');
            if (!fileName) return;

            const url = `https://raw.githubusercontent.com/${USER}/${REPO}/main/_posts/${fileName}?v=${Date.now()}`;

            try {
                const res = await fetch(url);
                const text = await res.text();
                const parts = text.split('---');

                if (parts.length >= 3) {
                    const meta = jsyaml.load(parts[1]);
                    
                    document.getElementById('post-title').innerText = meta.title;
                    document.getElementById('post-category').innerText = (meta.categories && meta.categories[0]) || "Journal";

                    // CORRECCIÓN: Usamos meta.thumbnail que es el nombre en tu archivo
                    if (meta.thumbnail) {
                        const img = document.getElementById('post-image');
                        const wrapper = document.getElementById('img-wrapper');
                        
                        // Extraemos el nombre del archivo (primo-article.png) por si la ruta viene con /
                        const fileNameOnly = meta.thumbnail.split('/').pop();
                        
                        // Construimos la ruta limpia
                        const cleanSrc = `images/blog/${fileNameOnly}`;
                        
                        img.src = cleanSrc;
                        wrapper.style.display = 'block';

                        // Intento de rescate si la ruta relativa falla
                        img.onerror = () => {
                            img.src = `https://raw.githubusercontent.com/${USER}/${REPO}/main/images/blog/${fileNameOnly}`;
                            img.onerror = () => wrapper.style.display = 'none';
                        };
                    }

                    document.getElementById('post-content').innerHTML = marked.parse(parts.slice(2).join('---'));
                }
            } catch (err) {
                console.error("Error:", err);
            }
        }
        window.onload = loadPost;
    </script>
</body>
</html>
