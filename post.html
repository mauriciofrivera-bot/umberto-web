<script>
        const GITHUB_USER = 'mauriciorivera-bot';
        const GITHUB_REPO = 'umberto-web';

        async function loadFullPost() {
            const params = new URLSearchParams(window.location.search);
            const fileName = params.get('article');

            if (!fileName) {
                console.error("No se encontró el nombre del archivo en la URL");
                window.location.href = 'blog.html';
                return;
            }

            try {
                // Intentamos obtener el archivo directamente desde el CDN de GitHub (más rápido y evita bloqueos de API)
                const rawUrl = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/_posts/${fileName}`;
                
                const response = await fetch(rawUrl);
                
                if (!response.ok) {
                    throw new Error(`Error al cargar el archivo: ${response.status}`);
                }

                const rawText = await response.text();

                // Separar Frontmatter del cuerpo
                const parts = rawText.split('---');
                
                if (parts.length >= 3) {
                    const metadata = jsyaml.load(parts[1]);
                    const markdownBody = parts.slice(2).join('---');

                    // Inyectar metadatos
                    document.title = `${metadata.title} | Umberto Campioni`;
                    document.getElementById('post-title').innerText = metadata.title;
                    document.getElementById('post-category').innerText = metadata.category || 'Journal';
                    
                    if (metadata.featured_image) {
                        const img = document.getElementById('post-image');
                        img.src = metadata.featured_image;
                        img.style.display = 'block';
                    }

                    // Renderizar Markdown
                    document.getElementById('post-content').innerHTML = marked.parse(markdownBody);
                } else {
                    throw new Error("El formato del archivo Markdown no es válido (falta el Frontmatter).");
                }

            } catch (error) {
                console.error("Error Rivera Engineering:", error);
                document.getElementById('post-content').innerHTML = `
                    <div style="text-align:center; padding: 40px; border: 1px solid #222;">
                        <p style="color: var(--dorado);">Sincronización pendiente.</p>
                        <p style="font-size: 0.9rem; color: #666;">Asegúrate de que el archivo "${fileName}" esté publicado en la rama principal de tu repositorio.</p>
                    </div>
                `;
            }
        }

        window.onload = loadFullPost;
    </script>s
