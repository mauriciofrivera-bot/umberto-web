<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Journal | Umberto Campioni</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>

    <style>
        :root {
            --dorado: #b58d52;
            --oscuro: #0a0a0a;
            --blanco: #f0f0f0;
            --gris-texto: #d1d1d1;
            /* Fuente de alta compatibilidad para símbolos ingleses como apóstrofes o comillas */
            --fuente-serif: 'EB Garamond', 'Garamond', 'Hoefler Text', 'Times New Roman', serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background-color: var(--oscuro); 
            color: var(--blanco); 
            font-family: var(--fuente-serif); 
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
        }

        /* --- NAVEGACIÓN --- */
        nav { 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
            gap: 25px; 
            border-bottom: 1px solid #1a1a1a; 
            position: sticky;
            top: 0;
            background: rgba(10, 10, 10, 0.9);
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        nav a { 
            color: var(--blanco); 
            text-decoration: none; 
            text-transform: uppercase; 
            font-size: 0.7rem; 
            letter-spacing: 2px; 
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .post-container {
            max-width: 780px; 
            margin: 60px auto;
            padding: 0 30px;
        }

        /* --- TÍTULO ENMARCADO Y ELEGANTE --- */
        .post-header {
            text-align: center;
            margin-bottom: 60px;
            padding: 40px 20px;
            border: 1px solid rgba(181, 141, 82, 0.3); /* Marco sutil dorado */
            position: relative;
        }

        .post-header h1 {
            font-size: 3.2rem;
            text-transform: uppercase;
            letter-spacing: 6px;
            line-height: 1.2;
            font-weight: 400;
            margin: 0;
        }

        /* --- EFECTO EN LA FOTOGRAFÍA --- */
        #img-wrapper {
            width: 100%;
            margin: 40px 0 60px 0;
            display: none;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 1px solid #1a1a1a;
            transition: transform 0.8s ease;
        }

        #img-wrapper:hover {
            transform: scale(1.02); /* Efecto de zoom sutil al pasar el mouse */
        }

        #post-image {
            width: 100%;
            height: auto;
            display: block;
            filter: grayscale(20%) contrast(110%); /* Efecto visual elegante */
            transition: filter 0.5s ease;
        }

        #img-wrapper:hover #post-image {
            filter: grayscale(0%) contrast(100%);
        }

        /* --- CONTENIDO --- */
        .post-content {
            font-size: 1.3rem;
            color: var(--gris-texto);
            text-align: justify;
        }

        /* Letra Capital */
        .post-content > p:first-of-type::first-letter {
            float: left;
            font-size: 5rem;
            line-height: 0.8;
            padding-right: 15px;
            padding-top: 10px;
            color: var(--dorado);
        }

        /* VIÑETAS ELEGANTES */
        .post-content ul {
            list-style: none;
            margin: 30px 0;
            padding-left: 20px;
        }

        .post-content li {
            position: relative;
            margin-bottom: 15px;
            padding-left: 30px;
        }

        .post-content li::before {
            content: "◆"; /* Diamante elegante en lugar de punto común */
            position: absolute;
            left: 0;
            color: var(--dorado);
            font-size: 0.8rem;
        }

        blockquote {
            font-style: italic;
            font-size: 1.6rem;
            color: var(--dorado);
            margin: 50px 0;
            text-align: center;
            border: none;
            position: relative;
        }

        /* --- MÓVIL --- */
        @media (max-width: 600px) {
            .post-header h1 { font-size: 2rem; letter-spacing: 3px; }
            .post-content { font-size: 1.15rem; text-align: left; }
            .post-container { margin: 30px auto; padding: 0 20px; }
        }

        #comments-section {
            margin-top: 100px;
            border-top: 1px solid #222;
            padding-top: 50px;
        }

        footer { text-align: center; padding: 80px 20px; color: #444; font-size: 0.7rem; letter-spacing: 2px; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="blog.html">Journal</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>

    <article class="post-container">
        <header class="post-header">
            <span id="post-category" style="display: none;"></span>
            <h1 id="post-title">...</h1>
        </header>

        <div id="img-wrapper">
            <img id="post-image" src="" alt="">
        </div>

        <div id="post-content" class="post-content">
            </div>

        <section id="comments-section">
            <div id="disqus_thread"></div>
        </section>
    </article>

    <footer>
        &copy; 2026 UMBERTO CAMPIONI. <br> BUILT BY RIVERA ENGINEERING.
    </footer>

    <script>
        const USER = 'mauriciofrivera-bot';
        const REPO = 'umberto-web';

        async function loadPost() {
            const params = new URLSearchParams(window.location.search);
            const article = params.get('article');
            if (!article) return;

            try {
                const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/_posts/${article}`);
                const data = await res.json();
                const text = atob(data.content);
                const parts = text.split('---');

                if (parts.length >= 3) {
                    const meta = jsyaml.load(parts[1]);
                    document.title = `${meta.title} | Umberto Campioni`;
                    document.getElementById('post-title').innerText = meta.title;
                    
                    if (meta.thumbnail) {
                        const img = document.getElementById('post-image');
                        const wrapper = document.getElementById('img-wrapper');
                        const fileName = meta.thumbnail.split('/').pop();
                        img.src = `images/blog/${fileName}`;
                        wrapper.style.display = 'block';
                        img.onerror = () => img.src = `https://raw.githubusercontent.com/${USER}/${REPO}/main/images/blog/${fileName}`;
                    }

                    // Renderizado del contenido
                    document.getElementById('post-content').innerHTML = marked.parse(parts.slice(2).join('---'));
                    
                    // Disqus
                    var disqus_config = function () {
                        this.page.url = window.location.href;
                        this.page.identifier = article;
                    };
                    var d = document, s = d.createElement('script');
                    s.src = 'https://umberto-sommelier.disqus.com/embed.js';
                    s.setAttribute('data-timestamp', +new Date());
                    (d.head || d.body).appendChild(s);
                }
            } catch (err) { console.error(err); }
        }
        window.onload = loadPost;
    </script>
</body>
</html>
