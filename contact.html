<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Contact | Umberto Campioni</title>
    
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">

    <style>
        :root {
            --dorado: #b58d52;
            --dorado-brillante: #e0b36e;
            --oscuro-puro: #000000;
            --blanco: #ffffff;
            --gris-labels: #cccccc; /* Más visible */
            --gris-linea: #444444; /* Línea de campo más iluminada */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--oscuro-puro);
            color: var(--blanco);
            font-family: 'EB Garamond', serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        nav {
            display: flex;
            justify-content: center;
            padding: 30px;
            gap: 25px;
            background: var(--oscuro-puro);
            border-bottom: 1px solid #111;
        }

        nav a {
            color: #888;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 3px;
            transition: color 0.3s;
        }

        nav a:hover { color: var(--dorado); }

        .container {
            max-width: 900px;
            margin: 60px auto;
            padding: 0 40px;
        }

        .contact-header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 { 
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 10vw, 4rem); 
            text-transform: uppercase; 
            letter-spacing: 8px; 
            font-weight: 700; 
            color: var(--blanco);
            margin-bottom: 10px;
        }

        .subtitle { 
            font-family: 'EB Garamond', serif;
            font-size: 1rem; 
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--dorado);
            font-weight: 700;
        }

        .form-wrapper {
            margin-top: 40px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gris-labels); /* Color de etiqueta aclarado */
            margin-bottom: 12px;
            font-weight: 700;
        }

        input, textarea {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1.5px solid var(--gris-linea); /* Línea más gruesa y clara */
            color: var(--blanco);
            padding: 12px 0;
            font-family: 'EB Garamond', serif;
            font-size: 1.2rem;
            outline: none;
            transition: all 0.4s ease;
        }

        /* Efecto de iluminación al enfocar el campo */
        input:focus, textarea:focus {
            border-bottom-color: var(--dorado-brillante);
            color: var(--blanco);
            background: rgba(255, 255, 255, 0.03); /* Sutil brillo de fondo */
        }

        /* Marcador de posición (placeholder) */
        input::placeholder, textarea::placeholder {
            color: #555;
            font-style: italic;
        }

        .btn-submit {
            background: transparent;
            border: 1px solid var(--dorado);
            color: var(--dorado);
            padding: 20px 0;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 30px;
            transition: all 0.4s ease;
        }

        .btn-submit:hover {
            background: var(--dorado);
            color: var(--oscuro-puro);
            box-shadow: 0 0 20px rgba(181, 141, 82, 0.2);
        }

        footer {
            text-align: center;
            padding: 80px 20px 40px;
            color: #444;
            font-size: 0.7rem;
            letter-spacing: 3px;
        }

        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; gap: 0; }
            .container { margin: 40px auto; padding: 0 20px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="blog.html">Journal</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>

    <div class="container">
        <header class="contact-header">
            <h1>Contact</h1>
            <p class="subtitle">Inquiry Form</p>
        </header>

        <div class="form-wrapper">
            <form name="contact" method="POST" data-netlify="true" action="/success.html">
                <input type="hidden" name="form-name" value="contact" />
                
                <div class="form-row">
                    <div class="input-group">
                        <label>First Name</label>
                        <input type="text" name="first_name" required placeholder="Enter your first name">
                    </div>
                    <div class="input-group">
                        <label>Last Name</label>
                        <input type="text" name="last_name" required placeholder="Enter your last name">
                    </div>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" name="email" required placeholder="example@domain.com">
                    </div>
                    <div class="input-group">
                        <label>Organization</label>
                        <input type="text" name="organization" placeholder="Company or Brand">
                    </div>
                </div>

                <div class="input-group">
                    <label>How can we help you?</label>
                    <textarea name="message" rows="4" required placeholder="Tell me about your project..."></textarea>
                </div>

                <button type="submit" class="btn-submit">Submit Inquiry</button>
            </form>
        </div>
    </div>

    <footer>
        &copy; 2026 UMBERTO CAMPIONI. BUILT BY RIVERA ENGINEERING.
    </footer>

</body>
</html>
