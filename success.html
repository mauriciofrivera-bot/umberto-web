<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Umberto Campioni</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root { --dorado: #b58d52; --oscuro: #0a0a0a; --crema: #f9f7f2; }
        body { background: var(--crema); font-family: 'EB Garamond', serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .box { padding: 40px; border: 1px solid var(--dorado); max-width: 500px; }
        h1 { font-family: 'Playfair Display', serif; color: var(--dorado); text-transform: uppercase; letter-spacing: 3px; }
        p { font-size: 1.2rem; color: #333; margin-bottom: 30px; }
        .btn { text-decoration: none; background: var(--oscuro); color: white; padding: 15px 30px; text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; transition: background 0.3s; }
        .btn:hover { background: var(--dorado); }
    </style>
</head>
<body>
    <div class="box">
        <h1>Message Received</h1>
        <p>Thank you for reaching out. I will personally review your inquiry and get back to you shortly.</p>
        <a href="index.html" class="btn">Return Home</a>
    </div>
        <footer>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

        <!-- Enlace Cuenta 1 -->

            <i class="fa-brands fa-instagram"></i>
            <span>Umberto_Campioni</span>
        </a>

        <!-- Barra vertical con color visible y espacios -->
        <span style="color: var(--blanco-suave, #f0f0f0); margin: 0 10px;">|</span>

        <!-- Enlace Cuenta 2 -->

            <i class="fa-brands fa-instagram"></i>
            <span>Fashion__Gourmet</span>
        </a>


<style>
    .instagram-link {
        display: inline-flex;
        align-items: center;
        gap: 10px; /* Espacio entre el logo y el texto */
        color: var(--blanco, #f0f0f0); /* Color blanco suave por defecto */
        text-decoration: none;
        text-transform: uppercase;
        font-family: 'Garamond', serif;
        font-size: 0.9rem;
        letter-spacing: 2px;
        transition: color 0.3s ease, transform 0.3s ease;
    }

    /* El tamaño del icono de Instagram se ajusta automáticamente con el font-size */
    .instagram-link i {
        font-size: 1.3rem; 
    }

    /* Efecto sutil al pasar el cursor (Cambia al color dorado característico) */
    .instagram-link:hover {
        color: #b58d52; /* Tu color --dorado corporativo */
        transform: translateY(-2px); /* Pequeño movimiento hacia arriba muy elegante */
    }
</style>


        <p>&copy; 2026 UMBERTO CAMPIONI.</p>
    </footer>

    <script>
        const observerOptions = { threshold: 0.15, rootMargin: "0px 0px -50px 0px" };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) { entry.target.classList.add('active'); } });
        }, observerOptions);
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>

    <script>

        const observer = new IntersectionObserver((entries) => {

    </script>
