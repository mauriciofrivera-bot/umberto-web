<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Umberto Campioni</title>
    <style>
        :root {
            --dorado: #b58d52;
            --oscuro: #0a0a0a;
            --blanco-suave: #f0f0f0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--oscuro); color: var(--blanco-suave); font-family: 'Garamond', serif; line-height: 1.5; }
        nav { display: flex; justify-content: center; padding: 20px; gap: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        nav a { color: var(--blanco-suave); text-decoration: none; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1.5px; }
        
        .blog-header { text-align: center; padding: 60px 20px; }
        .blog-header h1 { font-size: 3rem; text-transform: uppercase; letter-spacing: 5px; font-weight: normal; }
        
        .blog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 40px; padding: 0 5% 40px; max-width: 1200px; margin: 0 auto; }
        
        .post-card { text-decoration: none; color: inherit; opacity: 0; transform: translateY(20px); transition: 1s all ease; }
        .post-card.active { opacity: 1; transform: translateY(0); }
        
        .post-img-box { width: 100%; height: 250px; background: #111; overflow: hidden; margin-bottom: 15px; }
        .post-img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .post-content h2 { font-size: 1.5rem; margin-bottom: 10px; font-weight: normal; text-transform: uppercase; }
        .post-content p { color: #888; font-size: 0.9rem; margin-bottom: 15px; }
        .read-more { color: var(--dorado); text-transform: uppercase; font-size: 0.7rem; font-weight: bold; letter-spacing: 1px; }
        
        footer { text-align: center; padding: 40px; color: #444; font-size: 0.7rem; border-top: 1px solid #111; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="blog.html">Blog</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>

    <header class="blog-header">
        <h1>Journal</h1>
        <p style="color: var(--dorado); font-style: italic;">Historias desde la cava.</p>
    </header>

    <main id="blog-posts" class="blog-grid">
        <p id="status" style="grid-column: 1/-1; text-align: center; color: #666;">Sincronizando con GitHub...</p>
    </main>

    <footer>
        <p>&copy; 2026 UMBERTO CAMPIONI. BUILT BY RIVERA ENGINEERING.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script>
        const USER = 'mauriciofrivera-bot';
        const REPO = 'umberto-web';

        async function initBlog() {
            const container = document.getElementById('blog-posts');
            const status = document.getElementById('status');

            try {
                // Paso 1: Obtener la lista de archivos usando la API (ahora que es público funcionará)
                const response = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/_posts`);
                
                if (!response.ok) throw new Error("No se pudo acceder a la lista de archivos.");
                
                const files = await response.json();
                status.remove();

                for (const file of files) {
                    if (file.name.endsWith('.md')) {
                        // Paso 2: Obtener el contenido de cada archivo
                        const resContent = await fetch(file.download_url);
                        const text = await resContent.text();
                        
                        const parts = text.split('---');
                        if (parts.length >= 3) {
                            const meta = jsyaml.load(parts[1]);
                            const excerpt = parts.slice(2).join('---').substring(0, 120) + "...";

                            const card = document.createElement('a');
                            card.href = `post.html?article=${file.name}`;
                            card.className = 'post-card';
                            card.innerHTML = `
                                <div class="post-img-box">
                                    <img src="${meta.featured_image || 'images/default.jpg'}" alt="">
                                </div>
                                <div class="post-content">
                                    <h2>${meta.title || 'Sin título'}</h2>
                                    <p>${meta.description || excerpt}</p>
                                    <span class="read-more">Read article</span>
                                </div>
                            `;
                            container.appendChild(card);
                            
                            // Forzar la animación de aparición
                            setTimeout(() => card.classList.add('active'), 100);
                        }
                    }
                }
            } catch (err) {
                console.error(err);
                status.innerText = "Error de conexión. Intenta refrescar la página.";
            }
        }

        window.onload = initBlog;
    </script>
</body>
</html>
